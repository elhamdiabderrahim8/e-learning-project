<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paiements - Admin</title>
    <link rel="stylesheet" href="style.css">
<style>
    .page-content table { width: 100%; border-collapse: collapse; border: 1px solid #dee2e6; }
    .page-content th, .page-content td { padding: 10px; border: 1px solid #dee2e6; text-align: left; }
    .page-content tr:hover { background: #f6f8fa; cursor: pointer; }
    .page-content tr.selected { background: #d8ebff; }
</style>
</head>
<body>
    <div class="page-content">
        <h2>Paiements</h2>
        <div id="payments-table"></div>
    </div>

    <script>
        async function loadPayments() {
            const target = document.getElementById('payments-table');
            target.innerHTML = '<p>Chargement...</p>';
            try {
                const res = await fetch('api/payments.php');
                const data = await res.json();
                if (!Array.isArray(data)) throw new Error('Données invalides');
                let html = '<table><thead><tr><th>ID</th><th>Étudiant</th><th>Cours</th><th>Prof</th><th>Date</th><th>Méthode</th><th>Status</th><th>Action</th></tr></thead><tbody>';
                data.forEach(r => {
                    const status = r.paiement_valide == 1 ? 'Validé' : 'En attente';
                    const btn = r.paiement_valide == 1 ? '' : `<button onclick="approve(${r.id_inscription})">Valider</button>`;
                    html += `<tr><td>${r.id_inscription}</td><td>${r.nom_etudiant} ${r.prenom_etudiant}</td><td>${r.nom_cours}</td><td>${r.nom_prof} ${r.prenom_prof}</td><td>${r.date_achat}</td><td>${r.methode_paiement}</td><td>${status}</td><td>${btn}</td></tr>`;
                });
                html += '</tbody></table>';
                target.innerHTML = html;
                document.querySelectorAll('#payments-table table tbody tr').forEach(row => {
                    row.addEventListener('click', () => {
                        document.querySelectorAll('#payments-table table tbody tr').forEach(r => r.classList.remove('selected'));
                        row.classList.add('selected');
                    });
                });
            } catch (e) {
                target.innerHTML = '<p>Erreur de chargement des paiements.</p>';
            }
        }

        async function approve(id) {
            await fetch('api/approve_payment.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'id_inscription=' + encodeURIComponent(id)
            });
            loadPayments();
        }

        loadPayments();
    </script>
</body>
</html>
