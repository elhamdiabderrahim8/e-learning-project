<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Smart Learning</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">Smart Learning</div>
                <h1>Créer un compte</h1>
                <p>Rejoignez la communauté et commencez à apprendre.</p>
            </div>

            <form class="register-form" action="offres.html">
                <div class="input-row">
                    <div class="input-group">
                        <label for="firstname">Prénom</label>
                        <input type="text" id="firstname" placeholder="Jean" required>
                    </div>
                    <div class="input-group">
                        <label for="lastname">Nom</label>
                        <input type="text" id="lastname" placeholder="Dupont" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Adresse Email</label>
                    <input type="email" id="email" placeholder="jean.dupont@exemple.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="Minimum 8 caractères" required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required>
                </div>

                <div class="terms">
                    <label>
                        <input type="checkbox" required> J'accepte les <a href="#">conditions d'utilisation</a>
                    </label>
                </div>

                <button type="submit" class="btn-login">Créer mon compte</button>

                <div class="login-footer">
                    Déjà inscrit ? <a href="login.html">Se connecter</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
