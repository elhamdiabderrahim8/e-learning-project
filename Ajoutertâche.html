<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ajouter tâche</title>

<style>
body{font-family:Segoe UI;background:#F9FAFB;padding:30px;}

form{
background:white;
padding:20px;
border-radius:15px;
width:400px;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#06B6D4;
color:white;
padding:10px;
border:none;
border-radius:10px;
width:100%;
}
</style>

</head>

<body>

<h2>Ajouter une tâche</h2>

<form>
<input type="text" placeholder="Titre">
<textarea placeholder="Description"></textarea>
<input type="date">
<button>Ajouter</button>
</form>

</body>
</html>
